<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮ ማክስ | Sayint Gebeya Absolute Engine</title>
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2ecc71; --secondary: #f39c12; --accent: #3498db; --danger: #e74c3c; --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #f1f1f1; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 50px; }
        
        header { background: linear-gradient(135deg, var(--primary), #27ae60); color: white; padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--secondary); clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.1); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-secondary { background: var(--secondary); }
        
        /* Auth UI */
        #authSection { display: none; margin-bottom: 20px; }
        .auth-toggle { color: var(--accent); cursor: pointer; text-decoration: underline; font-size: 13px; }

        /* Product Card */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; }
        .product-card { background: var(--card); border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
        .product-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .badge { position: absolute; top: 15px; left: 15px; background: white; color: var(--accent); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; z-index: 10; }
        .price { color: var(--secondary); font-size: 30px; font-weight: 900; margin: 10px 0; }

        /* Interaction */
        .action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .act-btn { padding: 12px; border-radius: 12px; text-decoration: none; text-align: center; color: white; font-weight: bold; font-size: 14px; border: none; cursor: pointer; }
        
        .comment-box { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 20px; margin-top: 15px; }
        .comm-item { background: var(--card); padding: 6px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid var(--accent); font-size: 12px; }

        #receiptSection { display: none; background: #eef2ff; border: 3px solid var(--accent); padding: 25px; border-radius: 25px; margin-top: 20px; }
        .receipt-card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; gap: 15px; align-items: center; color: #333; }

        .theme-btn { position: fixed; top: 15px; right: 15px; z-index: 1000; background: var(--card); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: var(--text); }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body id="body">

<button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>

<header>
    <h1>ሳይንት ገበያ ፕሮ ማክስ</h1>
    <p>የአምሐራ ሳይንት የዲጂታል ገበያ ሞተር | በያለለት የተገነባ</p>
</header>

<div class="container">
    <!-- User Login Section -->
    <div class="card" id="userCard">
        <div id="loggedOutUI">
            <h3 id="authTitle">ሻጭ ነዎት? ይግቡ</h3>
            <input type="email" id="authEmail" placeholder="ኢሜይል">
            <input type="password" id="authPass" placeholder="ፓስወርድ">
            <button class="btn" onclick="handleAuth()">ይግቡ / ይመዝገቡ</button>
            <p class="auth-toggle" onclick="toggleAuthMode()">አዲስ ከሆኑ ይመዝገቡ</p>
        </div>
        <div id="loggedInUI" style="display:none;">
            <p>ሰላም <span id="userDisp" style="font-weight:bold;"></span>! ምርትዎን ለመለጠፍ ዝግጁ ነዎት።</p>
            <button class="btn btn-secondary" onclick="toggleAdmin()">+ አዲስ ምርት ይጨምሩ</button>
            <button class="btn" style="background:var(--dark); margin-top:5px;" onclick="viewReceipts()">ደረሰኞችን እይ (Admin)</button>
            <button class="btn" style="background:var(--danger); margin-top:5px; padding:5px;" onclick="logout()">ውጣ (Logout)</button>
        </div>
    </div>

    <!-- Add Product Form -->
    <div id="adminForm" class="card" style="display:none;">
        <input type="text" id="pName" placeholder="የምርት ስም">
        <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
        <select id="pCat"><option value="እህል">እህል</option><option value="ከብት">ከብት</option><option value="ማር">ማር</option></select>
        <input type="text" id="pSeller" placeholder="የሻጭ ስም">
        <input type="text" id="pPhone" placeholder="ስልክ">
        <input type="text" id="pTg" placeholder="ቴሌግራም ስም">
        <input type="text" id="pBank" placeholder="የባንክ/ቴሌብር መረጃ">
        <input type="file" id="pImage" accept="image/*">
        <div id="loadMsg" style="display:none; color:var(--accent);">ምርቱ ለፈጣን ኢንተርኔት እየተዘጋጀ ነው...</div>
        <button class="btn" onclick="processAndAdd()">ገበያ ላይ ይውጣ</button>
    </div>

    <div class="card">
        <input type="text" id="searchBox" onkeyup="filterItems()" placeholder="ምርት ይፈልጉ...">
    </div>

    <div id="receiptSection" class="card">
        <h3>የደረሰኞች ማከማቻ</h3>
        <div id="receiptList"></div>
    </div>

    <div id="productGrid" class="product-grid"></div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">የክፍያ ማረጋገጫ</h2>
        <p id="bankDetails" style="font-size: 18px; font-weight: bold;"></p>
        <input type="file" id="receiptImg">
        <button class="btn" style="background:var(--accent); margin-top:10px;" onclick="sendReceipt()">ደረሰኝ ላክ</button>
        <button onclick="closeModal()" style="color:red; background:none; border:none; margin-top:15px; cursor:pointer;">ዝጋ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let allP = [], isLoginMode = true, curPName = "";

    // --- Authentication Logic ---
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "ሻጭ ነዎት? ይግቡ" : "እንደ አዲስ ሻጭ ይመዝገቡ";
    }

    async function handleAuth() {
        const e = document.getElementById('authEmail').value;
        const p = document.getElementById('authPass').value;
        try {
            if(isLoginMode) await auth.signInWithEmailAndPassword(e, p);
            else await auth.createUserWithEmailAndPassword(e, p);
        } catch(err) { alert("ስህተት፡ " + err.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('loggedOutUI').style.display = "none";
            document.getElementById('loggedInUI').style.display = "block";
            document.getElementById('userDisp').innerText = user.email;
        } else {
            document.getElementById('loggedOutUI').style.display = "block";
            document.getElementById('loggedInUI').style.display = "none";
        }
    });

    function logout() { auth.signOut(); location.reload(); }

    // --- Product Logic ---
    function toggleAdmin() { const f = document.getElementById('adminForm'); f.style.display = f.style.display==='none' ? 'block' : 'none'; }
    function toggleTheme() { document.getElementById('body').classList.toggle('dark-mode'); }
    function closeModal() { document.getElementById('payModal').style.display = "none"; }

    async function processAndAdd() {
        const file = document.getElementById('pImage').files[0];
        if(!file) return;
        document.getElementById('loadMsg').style.display="block";
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 800; let w=img.width, h=img.height;
                if(w>MAX){h*=MAX/w; w=MAX;}
                canvas.width=w; canvas.height=h;
                canvas.getContext("2d").drawImage(img,0,0,w,h);
                db.ref('products').push({
                    name: document.getElementById('pName').value, price: Number(document.getElementById('pPrice').value),
                    category: document.getElementById('pCat').value, seller: document.getElementById('pSeller').value,
                    phone: document.getElementById('pPhone').value, telegram: document.getElementById('pTg').value,
                    bank: document.getElementById('pBank').value, img: canvas.toDataURL("image/jpeg",0.6),
                    status: 'available', views: 0, likes: 0, dislikes: 0, time: Date.now()
                }).then(()=>location.reload());
            };
        };
    }

    db.ref('products').on('value', snap => {
        allP = []; snap.forEach(c => { let d=c.val(); d.id=c.key; allP.push(d); });
        renderGrid(allP);
    });

    function renderGrid(items) {
        const grid = document.getElementById('productGrid'); grid.innerHTML = "";
        items.reverse().forEach(p => {
            const isSold = p.status === 'sold';
            let comms = "";
            if(p.comments) Object.values(p.comments).forEach(c => comms += `<div class="comm-item">💬 ${c.text}</div>`);
            grid.innerHTML += `
                <div class="product-card ${isSold ? 'sold' : ''}">
                    <div class="badge">✅ የታመነ</div>
                    <div style="position:absolute; top:15px; right:15px; color:white; font-size:10px; background:rgba(0,0,0,0.5); padding:4px; border-radius:10px;">👁️ ${p.views||0}</div>
                    <img src="${p.img}" onclick="updateStat('${p.id}','views')">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <div class="action-group">
                            <a href="tel:${p.phone}" class="act-btn" style="background:var(--primary)">ደውል</a>
                            <a href="https://t.me/${p.telegram}" target="_blank" class="act-btn" style="background:#0088cc">አውራ</a>
                        </div>
                        <button class="btn" style="background:var(--accent); margin-top:10px" onclick="shareTg('${p.name}','${p.price}')">📲 አጋራ</button>
                        <button class="btn" style="background:var(--dark); margin-top:5px" onclick="openPay('${p.name}','${p.bank}')">💳 ክፈል / ደረሰኝ</button>
                        <div class="comment-box">
                            <div class="comm-list">${comms||'አስተያየት የለም'}</div>
                            <div style="display:flex; gap:5px"><input type="text" id="in-${p.id}" placeholder="አስተያየት..." style="margin-bottom:0; font-size:12px;"><button class="btn" style="width:60px; padding:5px" onclick="addComm('${p.id}')">ላክ</button></div>
                        </div>
                        <div class="admin-box" style="${auth.currentUser ? '' : 'display:none;'}">
                            <button class="btn-sm" style="background:#34495e; color:white;" onclick="markSold('${p.id}')">ተሽጧል</button>
                            <button class="btn-sm" style="background:var(--danger); color:white;" onclick="delItem('${p.id}')">አጥፋ</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function updateStat(id, type) { db.ref('products/'+id+'/'+type).transaction(c => (c||0)+1); }
    function addComm(id) { const t=document.getElementById('in-'+id).value; if(t){db.ref('products/'+id+'/comments').push({text:t}); document.getElementById('in-'+id).value="";}}
    function shareTg(n,p) { window.open(`https://t.me/share/url?url=${encodeURIComponent("ምርት፡ "+n+"\nዋጋ፡ "+p+" ብር")}`); }
    function openPay(n,b) { curPName=n; document.getElementById('bankDetails').innerText=b; document.getElementById('payModal').style.display="block"; }
    function markSold(id) { if(prompt("Admin PIN?")==="2024") db.ref('products/'+id).update({status:'sold'}); }
    function delItem(id) { if(prompt("Admin PIN?")==="2024") db.ref('products/'+id).remove(); }

    function sendReceipt() {
        const file = document.getElementById('receiptImg').files[0];
        if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = () => {
            db.ref('receipts').push({product:curPName, img:reader.result, time:new Date().toLocaleString()}).then(() => { alert("ደረሰኝ ተልኳል!"); closeModal(); });
        };
    }

    function viewReceipts() {
        if(prompt("PIN?")==="2024") {
            const s = document.getElementById('receiptSection'); s.style.display="block";
            db.ref('receipts').on('value', snap => {
                const list = document.getElementById('receiptList'); list.innerHTML = "";
                snap.forEach(c => {
                    const d=c.val();
                    list.innerHTML += `<div class="receipt-card"><img src="${d.img}" style="width:80px;"><p>${d.product} - ${d.time}</p><button onclick="db.ref('receipts/${c.key}').remove()">አጥፋ</button></div>`;
                });
            });
        }
    }

    function filterItems() {
        const t = document.getElementById('searchBox').value.toLowerCase();
        const filtered = allP.filter(p => p.name.toLowerCase().includes(t));
        renderGrid(filtered);
    }
</script>
</body>
</html>
