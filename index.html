<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮፌሽናል | Sayint Gebeya Official</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #f39c12; --dark: #2c3e50; --light: #f8f9fa; --accent: #3498db; --danger: #e74c3c; --gray: #95a5a6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        header { background: var(--primary); color: white; padding: 40px 15px; text-align: center; border-bottom: 6px solid var(--secondary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* ማራኪ ፎርም */
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #eee; }
        input, select, textarea { padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; transition: 0.3s; }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }
        #adminForm { display: none; background: #fffcf4; padding: 25px; border-radius: 20px; border: 2px dashed var(--secondary); margin-top: 15px; }

        /* የምርት ካርድ */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
        .product-card.is-sold { opacity: 0.7; filter: grayscale(0.6); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        
        .badge-sold { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: var(--danger); color: white; padding: 10px 30px; border-radius: 10px; font-size: 24px; font-weight: bold; border: 4px solid white; z-index: 20; display: none; }
        .product-card.is-sold .badge-sold { display: block; }
        .time { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 20px; font-size: 10px; }
        
        .product-info { padding: 20px; }
        .price { color: var(--secondary); font-size: 28px; font-weight: bold; margin: 5px 0; }
        
        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-call { flex: 1; background: var(--primary); text-decoration: none; color: white; text-align: center; padding: 12px; border-radius: 10px; font-weight: bold; }
        .btn-pay { flex: 1; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .product-card.is-sold .btn-group { display: none; }

        /* Admin Actions */
        .admin-actions { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 11px; cursor: pointer; font-weight: bold; }
        .btn-sold { background: #34495e; color: white; }
        .btn-del { background: #fadbd8; color: var(--danger); }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 15% auto; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ ፕሮፌሽናል</h1>
    <p>የአምሐራ ሳይንት የዲጂታል ገበያ ማዕከል | በያለለት መለካሙ የተገነባ</p>
</header>

<div class="container">
    <div class="card">
        <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="የሚፈልጉትን ምርት እዚህ ይፈልጉ...">
        <button class="btn btn-add" onclick="toggleForm()">+ አዲስ ምርት ይጨምሩ</button>
        
        <div id="adminForm">
            <input type="text" id="pName" placeholder="የምርት ስም">
            <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            <input type="text" id="pSeller" placeholder="የሻጭ ስም">
            <input type="text" id="pPhone" placeholder="ስልክ ቁጥር">
            <input type="text" id="pBank" placeholder="የባንክ/ቴሌብር መረጃ">
            <input type="text" id="pLoc" placeholder="ያለበት ቀበሌ/መንደር">
            <textarea id="pDesc" placeholder="ስለ ምርቱ ዝርዝር መግለጫ..."></textarea>
            <input type="file" id="pImage" accept="image/*">
            <button class="btn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
</div>

<!-- Pay Modal -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">የክፍያ መረጃ</h2>
        <p id="bankDetails" style="font-size: 20px; font-weight: bold; margin: 20px 0;"></p>
        <input type="file" id="receiptImg" style="margin: 15px 0;">
        <button class="btn" style="background:var(--accent)" onclick="sendReceipt()">ደረሰኝ ላክ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">ዝጋ</button>
    </div>
</div>

<!-- የቀድሞው ኮድህ እንዳለ ሆኖ፣ በስክሪፕቱ ውስጥ displayProducts የሚለውን ክፍል እንዲህ አሻሽለነዋል -->

<script>
    // ... (የቀድሞው የFirebase Config እና ሌሎች ክፍሎች እንዳሉ ናቸው) ...

    function displayProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.reverse().forEach((p) => {
            const isSold = p.status === 'sold';
            // የቴሌግራም መልዕክት ማዘጋጃ
            const shareText = `የሳይንት ገበያ ምርት፡ ${p.name} \nዋጋ፡ ${p.price} ብር \nቦታ፡ ${p.loc} \nበዚህ ሊንክ ይመልከቱ፡ https://yalelet-creator.github.io/Sayint-gebeya/`;
            const telegramUrl = `https://t.me/share/url?url=${encodeURIComponent(shareText)}`;

            grid.innerHTML += `
                <div class="product-card ${isSold ? 'is-sold' : ''}">
                    <span class="badge-sold">ተሽጧል</span>
                    <span class="time">${p.time}</span>
                    <img src="${p.img}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <p style="font-size:13px; color:#7f8c8d;">📍 ${p.loc} | 👤 ${p.seller}</p>
                        
                        <div class="btn-group">
                            <a href="tel:${p.phone}" class="btn-call">ደውል</a>
                            <button class="btn-pay" onclick="openPay('${p.name}', '${p.bank}')">ክፈል</button>
                        </div>

                        <!-- አዲሱ የቴሌግራም ማጋሪያ ቁልፍ -->
                        <div style="margin-top:10px;">
                            <a href="${telegramUrl}" target="_blank" style="background:#0088cc; color:white; padding:8px; display:block; text-decoration:none; border-radius:10px; font-size:14px; font-weight:bold;">📲 በቴሌግራም አጋራ</a>
                        </div>
                        
                        <div class="admin-actions">
                            <button class="btn-sm btn-sold" onclick="markSold('${p.id}')">ተሽጧል በል</button>
                            <button class="btn-sm btn-del" onclick="deleteItem('${p.id}')">አጥፋ</button>
                        </div>
                    </div>
                </div>`;
        });
    }
    
    // ... (የቀረው ኮድ እንዳለ ይቀጥላል) ...
</script>
</body>
</html>
