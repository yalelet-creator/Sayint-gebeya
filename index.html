<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮፌሽናል | ክፍያ ያለው የንግድ ማዕከል</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #f39c12; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f7f6; color: var(--dark); line-height: 1.6; }
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--secondary); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .controls { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 40px; }
        input, select, textarea { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; }
        .btn-add { background: var(--secondary); margin-bottom: 15px; }
        
        #adminForm { display: none; background: #fffcf4; padding: 25px; border-radius: 20px; border: 2px dashed var(--secondary); margin-top: 20px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; transition: 0.4s; }
        .product-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .product-info { padding: 25px; }
        .price { color: var(--secondary); font-size: 30px; font-weight: bold; margin: 10px 0; }
        
        /* Buttons Row */
        .action-row { display: flex; gap: 10px; margin-top: 15px; }
        .call-btn { background: var(--primary); color: white; padding: 14px; flex: 1; text-decoration: none; border-radius: 12px; font-weight: bold; text-align: center; }
        .pay-btn { background: var(--blue); color: white; padding: 14px; flex: 1; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 15% auto; padding: 30px; border-radius: 20px; width: 80%; max-width: 400px; text-align: center; }
        .close-modal { float: right; cursor: pointer; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ ፕሮፌሽናል</h1>
    <p>የአምሐራ ሳይንት የንግድ መገናኛ ድልድይ | በያለለት የተገነባ</p>
</header>

<div class="container">
    <div class="controls">
        <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="ምርት ይፈልጉ...">
        <button class="btn btn-add" onclick="toggleForm()">+ አዲስ ምርት በክፍያ መረጃ ይጨምሩ</button>
        
        <div id="adminForm">
            <input type="text" id="pName" placeholder="የምርት ስም">
            <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            <input type="text" id="pSeller" placeholder="የሻጭ ስም">
            <input type="text" id="pPhone" placeholder="ስልክ ቁጥር">
            <input type="text" id="pBank" placeholder="የባንክ ስም እና አካውንት ቁጥር (ወይም ቴሌብር)">
            <textarea id="pDesc" placeholder="ዝርዝር መግለጫ..."></textarea>
            <input type="file" id="pImage" accept="image/*">
            <button class="btn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
</div>

<!-- Payment Modal -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 style="color:var(--blue)">የክፍያ መረጃ</h2>
        <p id="payDetails" style="font-size:18px; margin:20px 0; font-weight:bold;"></p>
        <p style="font-size:12px; color:#666;">ክፍያውን ከፈጸሙ በኋላ ለሻጩ ደውለው ያሳውቁ።</p>
        <button class="btn" onclick="closeModal()">ተረዳሁ</button>
    </div>
</div>

<script>
    // Firebase Config (Keep yours)
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allProducts = [];

    function toggleForm() {
        const f = document.getElementById('adminForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const seller = document.getElementById('pSeller').value;
        const phone = document.getElementById('pPhone').value;
        const bank = document.getElementById('pBank').value;
        const desc = document.getElementById('pDesc').value;
        const imgFile = document.getElementById('pImage').files[0];

        if(!name || !price || !phone || !bank || !imgFile) { alert("መረጃ ያሟሉ!"); return; }

        const reader = new FileReader();
        reader.readAsDataURL(imgFile);
        reader.onload = function() {
            db.ref('products').push({
                name, price, seller, phone, bank, desc,
                img: reader.result,
                status: 'available'
            }).then(() => location.reload());
        };
    }

    db.ref('products').on('value', (snap) => {
        allProducts = [];
        snap.forEach(child => {
            let d = child.val();
            d.id = child.key;
            allProducts.push(d);
        });
        displayProducts(allProducts);
    });

    function displayProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.reverse().forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" alt="product">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <p style="font-size:13px; color:#7f8c8d;">ሻጭ፦ ${p.seller}</p>
                        <div class="action-row">
                            <a href="tel:${p.phone}" class="call-btn">ደውል</a>
                            <button class="pay-btn" onclick="openPay('${p.bank}')">ክፈል</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function openPay(bankInfo) {
        document.getElementById('payDetails').innerText = bankInfo;
        document.getElementById('payModal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('payModal').style.display = "none";
    }

    function searchProducts() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
        displayProducts(filtered);
    }
</script>
</body>
</html>
