<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮ | Sayint Gebeya Official</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #f39c12; --dark: #2c3e50; --light: #f8f9fa; --accent: #3498db; --danger: #e74c3c; --gray: #95a5a6; --telegram: #0088cc; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        header { background: var(--primary); color: white; padding: 40px 15px; text-align: center; border-bottom: 6px solid var(--secondary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #eee; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 17px; width: 100%; transition: 0.3s; }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }
        #adminForm { display: none; background: #fffcf4; padding: 20px; border-radius: 15px; border: 2px dashed var(--secondary); margin-top: 15px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; cursor: pointer; }
        .is-sold { opacity: 0.7; filter: grayscale(0.5); }
        .badge-sold { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: var(--danger); color: white; padding: 10px 30px; border-radius: 10px; font-size: 24px; font-weight: bold; border: 4px solid white; z-index: 20; display: none; }
        .is-sold .badge-sold { display: block; }

        .stats-row { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; z-index: 10; }
        .stat-badge { background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        
        .product-info { padding: 20px; }
        .price { color: var(--secondary); font-size: 28px; font-weight: bold; margin: 5px 0; }
        
        /* Vote Row UI */
        .vote-row { display: flex; justify-content: space-around; margin: 15px 0; padding: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .vote-btn { background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; padding: 8px 15px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; color: var(--dark); transition: 0.2s; }
        .vote-btn:hover { background: #eee; transform: scale(1.05); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-call { flex: 1; background: var(--primary); text-decoration: none; color: white; text-align: center; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .btn-pay { flex: 1; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; }
        
        .comment-section { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; }
        .comment-list { max-height: 100px; overflow-y: auto; font-size: 12px; margin-bottom: 8px; }
        .single-comment { margin-bottom: 4px; padding: 6px; background: white; border-radius: 8px; border-left: 3px solid var(--accent); }
        .comment-input-row { display: flex; gap: 5px; }
        .btn-send { width: 60px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .admin-actions { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        .btn-sm { flex: 1; padding: 7px; border-radius: 8px; border: none; font-size: 10px; cursor: pointer; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 15% auto; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ ፕሮፌሽናል</h1>
    <p>የአምሐራ ሳይንት የዲጂታል ገበያ ማዕከል | በያለለት የተገነባ</p>
</header>

<div class="container">
    <div class="card">
        <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="ምርት ይፈልጉ...">
        <button class="btn btn-add" onclick="toggleForm()">+ አዲስ ምርት ይጨምሩ</button>
        <button onclick="toggleReceipts()" style="background:var(--dark); color:white; padding:10px; border:none; border-radius:10px; width:100%; margin-top:5px; cursor:pointer; font-weight:bold;">የገቡ ደረሰኞችን እይ (Admin)</button>
        
        <div id="adminForm">
            <input type="text" id="pName" placeholder="የምርት ስም">
            <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            <input type="text" id="pSeller" placeholder="የሻጭ ስም">
            <input type="text" id="pPhone" placeholder="ስልክ ቁጥር">
            <input type="text" id="pBank" placeholder="የባንክ/ቴሌብር መረጃ">
            <input type="text" id="pLoc" placeholder="ቀበሌ/መንደር">
            <textarea id="pDesc" placeholder="ዝርዝር መግለጫ..."></textarea>
            <input type="file" id="pImage" accept="image/*">
            <button class="btn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>
    <div id="productGrid" class="product-grid"></div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">የክፍያ መረጃ</h2>
        <p id="bankDetails" style="font-size: 18px; font-weight: bold; margin: 15px 0;"></p>
        <input type="file" id="receiptImg">
        <button class="btn" style="background:var(--accent); margin-top:10px;" onclick="sendReceipt()">ደረሰኝ ላክ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">ዝጋ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentPName = "";

    function toggleForm() {
        const f = document.getElementById('adminForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const phone = document.getElementById('pPhone').value;
        const imgFile = document.getElementById('pImage').files[0];
        if(!name || !imgFile) return;

        const reader = new FileReader();
        reader.readAsDataURL(imgFile);
        reader.onload = () => {
            db.ref('products').push({
                name, price, phone, 
                bank: document.getElementById('pBank').value,
                seller: document.getElementById('pSeller').value,
                loc: document.getElementById('pLoc').value,
                desc: document.getElementById('pDesc').value,
                img: reader.result,
                status: 'available',
                views: 0, likes: 0, dislikes: 0,
                time: new Date().toLocaleString('am-ET')
            }).then(() => location.reload());
        };
    }

    db.ref('products').on('value', snap => {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        snap.forEach(child => {
            const p = child.val();
            const id = child.key;
            const isSold = p.status === 'sold';
            let commHTML = "";
            if(p.comments) Object.values(p.comments).forEach(c => commHTML += `<div class="single-comment">💬 ${c.text}</div>`);

            grid.innerHTML += `
                <div class="product-card ${isSold ? 'is-sold' : ''}">
                    <div class="stats-row">
                        <span class="stat-badge">👁️ ${p.views || 0}</span>
                        <span class="stat-badge" style="background:#2ecc71">👍 ${p.likes || 0}</span>
                        <span class="stat-badge" style="background:#e74c3c">👎 ${p.dislikes || 0}</span>
                    </div>
                    <span class="badge-sold">ተሽጧል</span>
                    <img src="${p.img}" onclick="incView('${id}')">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        
                        <div class="vote-row">
                            <button class="vote-btn" onclick="vote('${id}', 'likes')">👍 ውደድ</button>
                            <button class="vote-btn" onclick="vote('${id}', 'dislikes')">👎 አትውደድ</button>
                        </div>

                        <div class="btn-group">
                            <a href="tel:${p.phone}" class="btn-call">ደውል</a>
                            <button class="btn-pay" onclick="openPay('${p.name}', '${p.bank}')">ክፈል</button>
                        </div>
                        
                        <div class="comment-section">
                            <div class="comment-list">${commHTML || 'አስተያየት የለም'}</div>
                            <div class="comment-input-row">
                                <input type="text" id="comm-${id}" placeholder="አስተያየት...">
                                <button class="btn-send" onclick="addComm('${id}')">ላክ</button>
                            </div>
                        </div>

                        <div class="admin-actions">
                            <button class="btn-sm btn-sold" onclick="markSold('${id}')">ተሽጧል</button>
                            <button class="btn-sm btn-del" onclick="delItem('${id}')">አጥፋ</button>
                        </div>
                    </div>
                </div>`;
        });
    });

    // አስተማማኝ የመቆጠሪያ ዘዴ (Transaction)
    function incView(id) {
        db.ref('products/' + id + '/views').transaction((current) => (current || 0) + 1);
    }

    function vote(id, type) {
        db.ref('products/' + id + '/' + type).transaction((current) => (current || 0) + 1);
    }

    function addComm(id) {
        const input = document.getElementById('comm-' + id);
        if(input.value) {
            db.ref('products/' + id + '/comments').push({ text: input.value });
            input.value = "";
        }
    }

    function openPay(name, bank) { currentPName = name; document.getElementById('bankDetails').innerText = bank; document.getElementById('payModal').style.display = "block"; }
    function closeModal() { document.getElementById('payModal').style.display = "none"; }
    function markSold(id) { if(prompt("PIN?") === "2024") db.ref('products/' + id).update({ status: 'sold' }); }
    function delItem(id) { if(prompt("PIN?") === "2024") db.ref('products/' + id).remove(); }
    
    function sendReceipt() {
        const file = document.getElementById('receiptImg').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            db.ref('receipts').push({ product: currentPName, img: reader.result, time: new Date().toLocaleString() });
            alert("ደረሰኝ ተልኳል!"); closeModal();
        };
    }

    function toggleReceipts() {
        if(prompt("Admin PIN?") === "2024") {
            const sec = document.getElementById('receiptSection');
            sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
            db.ref('receipts').on('value', snap => {
                const list = document.getElementById('receiptList'); list.innerHTML = "";
                snap.forEach(c => {
                    const r = c.val();
                    list.innerHTML += `<div style="border-bottom:1px solid #eee; padding:10px;"><p>ምርት፡ ${r.product}</p><img src="${r.img}" style="width:100px;"></div>`;
                });
            });
        }
    }

    function searchProducts() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            const name = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = name.includes(term) ? "block" : "none";
        });
    }
</script>
</body>
</html>
