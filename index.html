<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ V2 | ያለለት ፈጠራ</title>
    <style>
        :root { --primary: #27ae60; --secondary: #e67e22; --light: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); }
        header { background: var(--primary); color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* የፍለጋ ክፍል */
        .controls { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        input#searchBar { flex: 1; min-width: 250px; padding: 12px; border: 2px solid #ddd; border-radius: 10px; }
        
        /* ምርት መመዝገቢያ ፎርም (Hidden by default) */
        .admin-btn { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
        #adminForm { display: none; background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .price { color: var(--secondary); font-size: 24px; font-weight: bold; margin: 10px 0; }
        .call-btn { background: var(--primary); color: white; padding: 12px; display: block; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .call-btn:hover { background: #219150; transform: scale(1.05); }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ (Sayint Gebeya)</h1>
    <p>የአምሐራ ሳይንት ዲጂታል የገበያ መረብ</p>
</header>

<div class="container">
    <button class="admin-btn" onclick="toggleForm()">+ ምርት ለመጨመር</button>
    
    <div id="adminForm">
        <h3>አዲስ ምርት ይጨምሩ</h3>
        <input type="text" id="pName" placeholder="የምርት ስም (ለምሳሌ፡ በግ)"> <br><br>
        <input type="number" id="pPrice" placeholder="ዋጋ (ብር)"> <br><br>
        <input type="text" id="pPhone" placeholder="የሻጭ ስልክ"> <br><br>
        <button onclick="addProduct()">ገበያ ላይ ይውጣ</button>
    </div>

    <div class="controls">
        <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="የሚፈልጉትን ምርት እዚህ ይፈልጉ...">
    </div>

    <div class="product-grid" id="productGrid">
        <!-- ምርቶች እዚህ ይታያሉ -->
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('sayintProducts')) || [];

    function toggleForm() {
        const form = document.getElementById('adminForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const phone = document.getElementById('pPhone').value;
        const img = "https://images.unsplash.com/photo-1511117833452-1811aa656c7d?w=500"; // Default image

        if(name && price && phone) {
            products.push({name, price, phone, img});
            localStorage.setItem('sayintProducts', JSON.stringify(products));
            displayProducts(products);
            toggleForm();
        } else {
            alert("እባክዎ መረጃውን ያሟሉ");
        }
    }

    function displayProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.forEach((p, index) => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" alt="product">
                    <h3>${p.name}</h3>
                    <p class="price">${p.price} ብር</p>
                    <a href="tel:${p.phone}" class="call-btn">ደውለው ይዘዙ</a>
                </div>
            `;
        });
    }

    function searchProducts() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(term));
        displayProducts(filtered);
    }

    window.onload = () => displayProducts(products);
</script>

</body>
</html>
