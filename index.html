<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮፌሽናል | Sayint Gebeya</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #f39c12; --dark: #2c3e50; --light: #ecf0f1; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f7f6; color: var(--dark); line-height: 1.6; }
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--secondary); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* ማራኪ ፎርም እና መቆጣጠሪያ */
        .controls { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 40px; }
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; }
        .btn-add { background: var(--secondary); margin-bottom: 15px; }
        
        #adminForm { display: none; background: #fffcf4; padding: 25px; border-radius: 20px; border: 2px dashed var(--secondary); margin-top: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        /* የምርት ካርዶች ዲዛይን */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; transition: 0.4s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .product-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .status-badge { position: absolute; top: 20px; left: 20px; background: var(--secondary); color: white; padding: 6px 15px; border-radius: 30px; font-size: 13px; font-weight: bold; }
        .time-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white; padding: 6px 12px; border-radius: 30px; font-size: 11px; }
        
        .product-info { padding: 25px; }
        .product-info h3 { margin: 0 0 10px 0; font-size: 24px; color: var(--dark); }
        .price { color: var(--secondary); font-size: 30px; font-weight: bold; margin: 10px 0; }
        .desc { font-size: 15px; color: #7f8c8d; margin-bottom: 15px; height: 45px; overflow: hidden; }
        .seller-info { display: flex; justify-content: space-between; font-size: 13px; color: #95a5a6; margin-bottom: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        
        .call-btn { background: var(--primary); color: white; padding: 16px; display: block; text-decoration: none; border-radius: 15px; font-weight: bold; text-align: center; font-size: 18px; }
        .delete-btn { background: none; color: var(--danger); border: none; cursor: pointer; font-size: 12px; margin-top: 15px; width: 100%; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ ፕሮፌሽናል</h1>
    <p>የአምሐራ ሳይንት የንግድ መገናኛ ድልድይ | በያለለት የተገነባ</p>
</header>

<div class="container">
    <div class="controls">
        <div class="search-row">
            <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="የሚፈልጉትን ምርት እዚህ ይፈልጉ...">
            <select id="filterCat" onchange="searchProducts()" style="width: 150px;">
                <option value="">ሁሉም</option>
                <option value="እህል">እህል</option>
                <option value="ከብት">ከብት</option>
                <option value="ማር">ማር</option>
            </select>
        </div>
        
        <button class="btn btn-add" onclick="toggleForm()">+ አዲስ ምርት በዝርዝር ይጨምሩ</button>
        
        <div id="adminForm">
            <div class="form-grid">
                <input type="text" id="pName" placeholder="የምርት ስም">
                <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            </div>
            <div class="form-grid">
                <input type="text" id="pSeller" placeholder="የሻጭ ስም">
                <input type="text" id="pPhone" placeholder="ስልክ ቁጥር">
            </div>
            <input type="text" id="pLoc" placeholder="ያለበት ቀበሌ/መንደር">
            <textarea id="pDesc" placeholder="ስለ ምርቱ ዝርዝር መግለጫ ይጻፉ..."></textarea>
            <select id="pCat" style="margin-bottom: 15px;">
                <option value="ሌላ">ዘርፍ ይምረጡ</option>
                <option value="እህል">እህል</option>
                <option value="ከብት">ከብት</option>
                <option value="ማር">ማር</option>
            </select>
            <input type="file" id="pImage" accept="image/*">
            <button class="btn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allProducts = [];

    function toggleForm() {
        const f = document.getElementById('adminForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const seller = document.getElementById('pSeller').value;
        const phone = document.getElementById('pPhone').value;
        const loc = document.getElementById('pLoc').value;
        const desc = document.getElementById('pDesc').value;
        const cat = document.getElementById('pCat').value;
        const imgFile = document.getElementById('pImage').files[0];

        if(!name || !price || !phone || !imgFile) { alert("እባክዎ መረጃ ያሟሉ!"); return; }

        const reader = new FileReader();
        reader.readAsDataURL(imgFile);
        reader.onload = function() {
            db.ref('products').push({
                name, price, seller, phone, loc, desc, cat,
                img: reader.result,
                time: new Date().toLocaleString('am-ET')
            }).then(() => location.reload());
        };
    }

    db.ref('products').on('value', (snap) => {
        allProducts = [];
        snap.forEach(child => {
            let d = child.val();
            d.id = child.key;
            allProducts.push(d);
        });
        displayProducts(allProducts);
    });

    function displayProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.reverse().forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <span class="status-badge">${p.cat}</span>
                    <span class="time-badge">🕒 ${p.time}</span>
                    <img src="${p.img}" alt="product">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <p class="desc">${p.desc || 'ዝርዝር መግለጫ አልተሰጠም።'}</p>
                        <div class="seller-info">
                            <span>👤 ${p.seller}</span>
                            <span>📍 ${p.loc}</span>
                        </div>
                        <a href="tel:${p.phone}" class="call-btn">አሁኑኑ ይደውሉ</a>
                        <button class="delete-btn" onclick="deleteItem('${p.id}')">ምርቱን አጥፋ (ለባለቤቱ ብቻ)</button>
                    </div>
                </div>`;
        });
    }

    function searchProducts() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const cat = document.getElementById('filterCat').value;
        const filtered = allProducts.filter(p => {
            return p.name.toLowerCase().includes(term) && (cat === "" || p.cat === cat);
        });
        displayProducts(filtered);
    }

    function deleteItem(id) {
        const pin = prompt("ለመሰረዝ ሚስጥራዊ ቁጥር (PIN) ያስገቡ፦");
        if(pin === "2024") { db.ref('products/' + id).remove(); }
        else { alert("ቁጥሩ ስህተት ነው!"); }
    }
</script>
</body>
</html>
