<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ | የደረሰኝ ማረጋገጫ ያለው</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #f39c12; --dark: #2c3e50; --light: #f4f7f6; --blue: #3498db; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f7f6; color: var(--dark); }
        header { background: var(--primary); color: white; padding: 30px; text-align: center; border-bottom: 6px solid var(--secondary); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Product Design */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; padding-bottom: 20px; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .price { color: var(--secondary); font-size: 24px; font-weight: bold; margin: 10px 0; }
        
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; width: 45%; }
        .btn-call { background: var(--primary); }
        .btn-pay { background: var(--blue); }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        /* Receipt View Section */
        #receiptSection { display: none; margin-top: 50px; background: #fff; padding: 20px; border-radius: 20px; border: 2px solid var(--blue); }
        .receipt-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
        .receipt-card img { width: 100px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ (Sayint Gebeya)</h1>
    <p>የአምሐራ ሳይንት ዲጂታል የገበያ መረብ</p>
</header>

<div class="container">
    <button onclick="toggleAdmin()" style="background:var(--dark); color:white; padding:10px; border-radius:5px; margin-bottom:20px;">ምርት ጨምር / ደረሰኝ እይ</button>
    
    <!-- Admin View -->
    <div id="adminPanel" style="display:none; background:white; padding:20px; border-radius:15px; margin-bottom:20px;">
        <h3>አዲስ ምርት መመዝገቢያ</h3>
        <input type="text" id="pName" placeholder="የምርት ስም" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="number" id="pPrice" placeholder="ዋጋ" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="text" id="pBank" placeholder="የባንክ አካውንት" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="file" id="pImage" style="width:100%; margin-bottom:10px;">
        <button onclick="addProduct()" style="width:100%; background:var(--secondary); color:white; padding:10px; border:none; border-radius:5px;">ገበያ ላይ ይውጣ</button>
        
        <hr>
        <button onclick="showReceipts()" style="width:100%; background:var(--blue); color:white; padding:10px; border:none; border-radius:5px; margin-top:10px;">የገቡ ደረሰኞችን እይ</button>
    </div>

    <div class="product-grid" id="productGrid"></div>

    <!-- Receipts Display -->
    <div id="receiptSection">
        <h3>የደረሰኞች ማከማቻ</h3>
        <div id="receiptList"></div>
    </div>
</div>

<!-- Pay Modal -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--blue)">ክፍያ ይፈጽሙ</h2>
        <p id="bankInfo" style="font-weight:bold; font-size:18px;"></p>
        <hr>
        <p>የከፈሉበትን ደረሰኝ (Screenshot) እዚህ ይላኩ፦</p>
        <input type="file" id="receiptImg" style="margin-bottom:10px;">
        <button onclick="sendReceipt()" style="background:var(--blue); color:white; width:100%; padding:10px; border:none; border-radius:5px;">ደረሰኝ ላክ</button>
        <button onclick="closeModal()" style="margin-top:10px; background:#ddd; border:none; padding:5px 10px;">ዝጋ</button>
    </div>
</div>

<script>
    // Firebase Config (Keep yours)
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentProductName = "";

    function toggleAdmin() {
        const pin = prompt("ሚስጥራዊ ቁጥር (PIN) ያስገቡ፦");
        if(pin === "2024") { document.getElementById('adminPanel').style.display = "block"; }
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const bank = document.getElementById('pBank').value;
        const file = document.getElementById('pImage').files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            db.ref('products').push({ name, price, bank, img: reader.result });
            alert("ተሳክቷል!"); location.reload();
        };
    }

    db.ref('products').on('value', snap => {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        snap.forEach(child => {
            const p = child.val();
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p class="price">${p.price} ብር</p>
                    <button class="btn btn-call" onclick="window.location.href='tel:09...'">ደውል</button>
                    <button class="btn btn-pay" onclick="openPay('${p.name}', '${p.bank}')">ክፈል</button>
                </div>`;
        });
    });

    function openPay(name, bank) {
        currentProductName = name;
        document.getElementById('bankInfo').innerText = bank;
        document.getElementById('payModal').style.display = "block";
    }

    function sendReceipt() {
        const file = document.getElementById('receiptImg').files[0];
        if(!file) { alert("ፎቶ ይምረጡ"); return; }
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            db.ref('receipts').push({
                product: currentProductName,
                img: reader.result,
                time: new Date().toLocaleString()
            });
            alert("ደረሰኝ ተልኳል! ሻጩ ያረጋግጣል።");
            closeModal();
        };
    }

    function showReceipts() {
        document.getElementById('receiptSection').style.display = "block";
        db.ref('receipts').on('value', snap => {
            const list = document.getElementById('receiptList');
            list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="receipt-card">
                        <p>ምርት፦ ${r.product}</p>
                        <p>ሰዓት፦ ${r.time}</p>
                        <img src="${r.img}" onclick="window.open(this.src)">
                    </div>`;
            });
        });
    }

    function closeModal() { document.getElementById('payModal').style.display = "none"; }
</script>

</body>
</html>
