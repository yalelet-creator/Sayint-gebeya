<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ሜጋ ፕሮ | Sayint Gebeya Ultimate</title>
    
    <!-- Firebase & FontAwesome Icons -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --primary: #2ecc71; --secondary: #f39c12; --accent: #3498db; 
            --danger: #e74c3c; --bg: #f0f2f5; --card: #ffffff; --text: #333; 
            --gray: #95a5a6; --telegram: #0088cc;
        }
        
        .dark-mode { 
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; 
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 50px; }
        
        header { 
            background: linear-gradient(135deg, var(--primary), #27ae60); color: white; 
            padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--secondary);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        /* Top Navigation */
        .top-nav { position: fixed; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .nav-circle { background: var(--card); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; color: var(--text); font-size: 18px; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Controls Section */
        .controls-card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; background: var(--card); color: var(--text); }
        input:focus { border-color: var(--primary); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }
        #adminForm { display: none; background: rgba(0,0,0,0.02); padding: 20px; border-radius: 15px; border: 2px dashed var(--secondary); margin-top: 15px; }

        /* Advanced Filtering Tabs */
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .filter-btn { padding: 8px 16px; border-radius: 30px; border: 1px solid var(--primary); background: none; color: var(--text); cursor: pointer; font-weight: bold; font-size: 13px; }
        .filter-btn.active { background: var(--primary); color: white; }

        /* Product Cards */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .product-card { background: var(--card); border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
        .product-card.is-sold { opacity: 0.6; filter: grayscale(0.5); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; cursor: pointer; }
        
        .badge-sold { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: var(--danger); color: white; padding: 10px 30px; border-radius: 10px; font-size: 24px; font-weight: bold; border: 4px solid white; z-index: 20; display: none; }
        .product-card.is-sold .badge-sold { display: block; }
        
        .verified-badge { position: absolute; top: 15px; left: 15px; background: white; color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 11px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Stats Row */
        .stats-row { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; z-index: 10; }
        .stat-badge { background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        
        .product-info { padding: 20px; }
        .price { color: var(--secondary); font-size: 28px; font-weight: 900; margin: 5px 0; }
        .loc-info { font-size: 12px; color: var(--gray); margin-bottom: 10px; }
        
        /* Like/Dislike Row */
        .vote-row { display: flex; justify-content: space-around; margin: 10px 0; padding: 5px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .vote-btn { background: none; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 5px; color: var(--text); }
        
        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-call { flex: 1; background: var(--primary); text-decoration: none; color: white; text-align: center; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .btn-pay { flex: 1; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-share { background: var(--telegram); color: white; padding: 10px; display: block; text-decoration: none; border-radius: 10px; font-weight: bold; text-align: center; margin-top: 10px; font-size: 14px; }

        /* Comment System */
        .comment-section { background: rgba(0,0,0,0.03); padding: 12px; border-radius: 15px; margin-top: 15px; text-align: left; }
        .comment-list { max-height: 80px; overflow-y: auto; font-size: 12px; margin-bottom: 8px; }
        .single-comment { margin-bottom: 4px; padding: 5px; background: var(--card); border-radius: 5px; border-left: 3px solid var(--accent); }
        .comment-input-row { display: flex; gap: 5px; }
        .comment-input-row input { margin-bottom: 0; padding: 6px; font-size: 12px; }
        .btn-send { width: 50px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Admin Actions */
        .admin-actions { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        .btn-sm { flex: 1; padding: 6px; border-radius: 8px; border: none; font-size: 10px; cursor: pointer; font-weight: bold; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body id="body">

<!-- Dark Mode Button -->
<div class="top-nav">
    <button class="nav-circle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
</div>

<header>
    <h1>ሳይንት ገበያ ፕሮፌሽናል</h1>
    <p>የአምሐራ ሳይንት ዲጂታል የገበያ ማዕከል | በያለለት የተገነባ</p>
</header>

<div class="container">
    <div class="controls-card">
        <!-- የላቀ ፍለጋ -->
        <input type="text" id="searchBar" onkeyup="filterItems()" placeholder="የሚፈልጉትን ምርት እዚህ ይፈልጉ...">
        
        <div class="filter-row">
            <button class="filter-btn active" onclick="setCategory('')">ሁሉም</button>
            <button class="filter-btn" onclick="setCategory('እህል')">እህል</button>
            <button class="filter-btn" onclick="setCategory('ከብት')">ከብት</button>
            <button class="filter-btn" onclick="setCategory('ማር')">ማር</button>
            <select id="sortPrice" onchange="filterItems()" style="width: auto; margin-bottom: 0; padding: 5px;">
                <option value="new">አዲስ የተለጠፈ</option>
                <option value="low">ዋጋ፡ ከረካሽ ወደ ውድ</option>
                <option value="high">ዋጋ፡ ከውድ ወደ ረካሽ</option>
            </select>
        </div>

        <button class="btn btn-add" onclick="toggleForm()">+ አዲስ ምርት በፎቶ ይጨምሩ</button>
        <button onclick="toggleReceipts()" style="background:var(--dark); color:white; padding:10px; border:none; border-radius:10px; width:100%; margin-top:5px; cursor:pointer; font-weight:bold;">የገቡ ደረሰኞችን እይ (Admin)</button>
        
        <!-- ምርት መመዝገቢያ ፎርም -->
        <div id="adminForm">
            <input type="text" id="pName" placeholder="የምርት ስም">
            <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            <input type="text" id="pSeller" placeholder="የሻጭ ስም">
            <input type="text" id="pPhone" placeholder="ስልክ ቁጥር">
            <input type="text" id="pBank" placeholder="የባንክ/ቴሌብር መረጃ">
            <input type="text" id="pLoc" placeholder="ያለበት ቀበሌ/መንደር">
            <textarea id="pDesc" placeholder="ስለ ምርቱ ዝርዝር መግለጫ..."></textarea>
            <select id="pCat">
                <option value="ሌላ">ዘርፍ ይምረጡ</option>
                <option value="እህል">እህል</option>
                <option value="ከብት">ከብት</option>
                <option value="ማር">ማር</option>
            </select>
            <p style="font-size:12px; color:gray;">የምርቱን ፎቶ ይምረጡ (በራሱ ጊዜ ያንሰዋል)፦</p>
            <input type="file" id="pImage" accept="image/*">
            <div id="compressing" style="display:none; color:var(--accent); font-weight:bold; margin-bottom:10px;">ፎቶው እየተዘጋጀ ነው...</div>
            <button class="btn" id="submitBtn" onclick="processAndAdd()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>

    <!-- የደረሰኞች ክፍል -->
    <div id="receiptSection" style="display:none;" class="controls-card">
        <h3>የደረሰኞች ማከማቻ</h3>
        <div id="receiptList"></div>
    </div>

    <!-- ምርቶች የሚወጡበት -->
    <div id="productGrid" class="product-grid"></div>
</div>

<!-- Pay Modal -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">የክፍያ መረጃ</h2>
        <p id="bankDetails" style="font-size: 18px; font-weight: bold; margin: 15px 0;"></p>
        <p style="font-size: 12px; color: #666;">ደረሰኝ (Screenshot) ይላኩ፦</p>
        <input type="file" id="receiptImg">
        <button class="btn" style="background:var(--accent); margin-top:10px;" onclick="sendReceipt()">ደረሰኝ ላክ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">ዝጋ</button>
    </div>
</div>

<script>
    // Firebase Config (ያለለት ቁልፎች)
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentPName = "";
    let allProducts = [];
    let selectedCategory = "";

    function toggleTheme() { document.getElementById('body').classList.toggle('dark-mode'); }
    
    function toggleForm() {
        const f = document.getElementById('adminForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function setCategory(cat) {
        selectedCategory = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        filterItems();
    }

    // ፎቶ የማሳነስ እና ምርት የመጨመር አስማት
    function processAndAdd() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const file = document.getElementById('pImage').files[0];
        if(!name || !price || !file) { alert("እባክዎ የምርት ስም፣ ዋጋ እና ፎቶ ያስገቡ!"); return; }

        document.getElementById('compressing').style.display = "block";
        document.getElementById('submitBtn').disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                
                // ፎቶውን ወደ 50% ጥራት አሳንሶ ወደ Base64 መቀየር
                const compressedBase64 = canvas.toDataURL("image/jpeg", 0.5);
                
                // ወደ Firebase መላክ
                db.ref('products').push({
                    name: name,
                    price: Number(price),
                    seller: document.getElementById('pSeller').value,
                    phone: document.getElementById('pPhone').value,
                    bank: document.getElementById('pBank').value,
                    loc: document.getElementById('pLoc').value,
                    desc: document.getElementById('pDesc').value,
                    category: document.getElementById('pCat').value,
                    img: compressedBase64,
                    status: 'available',
                    views: 0, likes: 0, dislikes: 0,
                    time: Date.now(),
                    displayTime: new Date().toLocaleString('am-ET')
                }).then(() => location.reload());
            };
        };
    }

    // መረጃን ማምጣት
    db.ref('products').on('value', snap => {
        allProducts = [];
        snap.forEach(child => {
            let d = child.val();
            d.id = child.key;
            allProducts.push(d);
        });
        filterItems();
    });

    // እውነተኛ የላቀ ፍለጋ
    function filterItems() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const sort = document.getElementById('sortPrice').value;

        let filtered = allProducts.filter(p => {
            const matchName = p.name.toLowerCase().includes(term);
            const matchCat = selectedCategory === "" || p.category === selectedCategory;
            return matchName && matchCat;
        });

        if(sort === "low") filtered.sort((a, b) => a.price - b.price);
        if(sort === "high") filtered.sort((a, b) => b.price - a.price);
        if(sort === "new") filtered.sort((a, b) => b.time - a.time);

        renderGrid(filtered);
    }

    // ምርቶችን በገጽ ላይ ማሳየት (ሁሉንም ባህሪያት ያካተተ)
    function renderGrid(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.forEach(p => {
            const id = p.id;
            const isSold = p.status === 'sold';
            
            let commHTML = "";
            if(p.comments) Object.values(p.comments).forEach(c => commHTML += `<div class="single-comment">💬 ${c.text}</div>`);

            const shareText = `የሳይንት ገበያ ምርት፡ ${p.name}\nዋጋ፡ ${p.price} ብር\nቦታ፡ ${p.loc}\nሊንክ፡ https://yalelet-creator.github.io/Sayint-gebeya/`;
            const telegramUrl = `https://t.me/share/url?url=${encodeURIComponent(shareText)}`;

            grid.innerHTML += `
                <div class="product-card ${isSold ? 'is-sold' : ''}">
                    <div class="verified"><i class="fas fa-check-circle"></i> የታመነ</div>
                    <div class="stats-row">
                        <span class="stat-badge">👁️ ${p.views || 0}</span>
                        <span class="stat-badge" style="background:#2ecc71">👍 ${p.likes || 0}</span>
                        <span class="stat-badge" style="background:#e74c3c">👎 ${p.dislikes || 0}</span>
                    </div>
                    <span class="badge-sold">ተሽጧል</span>
                    <img src="${p.img}" onclick="incView('${id}')">
                    
                    <div class="product-info">
                        <div style="color:var(--secondary); font-size:12px; margin-bottom:5px;">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <p class="loc-info">📍 ${p.loc} | 👤 ${p.seller} | 🕒 ${p.displayTime}</p>
                        
                        <div class="vote-row">
                            <button class="vote-btn" onclick="vote('${id}', 'likes')">👍 ውደድ</button>
                            <button class="vote-btn" onclick="vote('${id}', 'dislikes')">👎 አትውደድ</button>
                        </div>

                        <div class="btn-group">
                            <a href="tel:${p.phone}" class="btn-call">ደውል</a>
                            <button class="btn-pay" onclick="openPay('${p.name}', '${p.bank}')">ክፈል</button>
                        </div>
                        
                        <a href="${telegramUrl}" target="_blank" class="btn-share">📲 በቴሌግራም አጋራ</a>
                        
                        <div class="comment-section">
                            <div class="comment-list">${commHTML || 'አስተያየት የለም'}</div>
                            <div class="comment-input-row">
                                <input type="text" id="comm-${id}" placeholder="አስተያየት...">
                                <button class="btn-send" onclick="addComm('${id}')">ላክ</button>
                            </div>
                        </div>

                        <div class="admin-actions">
                            <button class="btn-sm" style="background:#34495e; color:white;" onclick="markSold('${id}')">ተሽጧል በል</button>
                            <button class="btn-sm" style="background:#fadbd8; color:red;" onclick="delItem('${id}')">አጥፋ</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    // እይታን እና ላይክን በሰላም መቁጠሪያ (Transactions)
    function incView(id) { db.ref('products/' + id + '/views').transaction(c => (c || 0) + 1); }
    function vote(id, type) { db.ref('products/' + id + '/' + type).transaction(c => (c || 0) + 1); }
    
    function addComm(id) {
        const input = document.getElementById('comm-' + id);
        if(input.value) { db.ref('products/' + id + '/comments').push({ text: input.value }); input.value = ""; }
    }
    
    function openPay(name, bank) { currentPName = name; document.getElementById('bankDetails').innerText = bank; document.getElementById('payModal').style.display = "block"; }
    function closeModal() { document.getElementById('payModal').style.display = "none"; }
    
    function markSold(id) { if(prompt("Admin PIN?") === "2024") db.ref('products/' + id).update({ status: 'sold' }); }
    function delItem(id) { if(prompt("Admin PIN?") === "2024") db.ref('products/' + id).remove(); }
    
    function sendReceipt() {
        const file = document.getElementById('receiptImg').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            db.ref('receipts').push({ product: currentPName, img: reader.result, time: new Date().toLocaleString() });
            alert("ደረሰኝ ተልኳል!"); closeModal();
        };
    }

    function toggleReceipts() {
        if(prompt("Admin PIN?") === "2024") {
            const sec = document.getElementById('receiptSection');
            sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
            db.ref('receipts').on('value', snap => {
                const list = document.getElementById('receiptList'); list.innerHTML = "";
                snap.forEach(c => {
                    const r = c.val();
                    list.innerHTML += `<div style="border-bottom:1px solid #eee; padding:10px;"><p>ምርት፡ ${r.product}</p><img src="${r.img}" style="width:100px; cursor:pointer;" onclick="window.open(this.src)"></div>`;
                });
            });
        }
    }
</script>
</body>
</html>
