<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ | Sayint Gebeya</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #27ae60; --secondary: #e67e22; --light: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .admin-section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #ddd; display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .add-toggle { background: var(--secondary); margin-bottom: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        .price { color: var(--secondary); font-size: 24px; font-weight: bold; margin: 10px 0; }
        .call-btn { background: var(--primary); color: white; padding: 12px; display: block; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ (Sayint Gebeya)</h1>
    <p>የአምሐራ ሳይንት ዲጂታል የገበያ መረብ</p>
</header>

<div class="container">
    <button class="btn add-toggle" onclick="toggleForm()">+ አዲስ ምርት ለመጨመር</button>
    
    <div id="adminForm" class="admin-section">
        <h3>ምርት መመዝገቢያ</h3>
        <input type="text" id="pName" placeholder="የምርት ስም (ለምሳሌ፡ በግ)">
        <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
        <input type="text" id="pPhone" placeholder="የሻጭ ስልክ ቁጥር">
        <button class="btn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
    </div>

    <div class="product-grid" id="productGrid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function toggleForm() {
        const form = document.getElementById('adminForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const phone = document.getElementById('pPhone').value;
        const img = "https://images.unsplash.com/photo-1511117833452-1811aa656c7d?w=500";

        if(name && price && phone) {
            database.ref('products').push({ name, price, phone, img });
            alert("ምርቱ በትክክል ገብቷል!");
            toggleForm();
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pPhone').value = "";
        }
    }

    database.ref('products').on('value', (snapshot) => {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        snapshot.forEach((childSnapshot) => {
            const p = childSnapshot.val();
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" alt="product">
                    <h3>${p.name}</h3>
                    <p class="price">${p.price} ብር</p>
                    <a href="tel:${p.phone}" class="call-btn">ደውለው ይዘዙ</a>
                </div>`;
        });
    });
</script>
</body>
</html>
