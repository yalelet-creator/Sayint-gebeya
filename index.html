<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮ ማክስ | Sayint Gebeya Absolute Edition</title>
    
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --primary: #2ecc71; --secondary: #f39c12; --accent: #3498db; 
            --danger: #e74c3c; --bg: #f0f2f5; --card: #ffffff; --text: #333; --gray: #95a5a6;
        }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 50px; }
        
        header { 
            background: linear-gradient(135deg, var(--primary), #27ae60); color: white; 
            padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--secondary);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; 
            margin-bottom: 10px; background: var(--card); color: var(--text); outline: none; box-sizing: border-box;
        }

        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }

        /* Product Cards */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; }
        .product-card { background: var(--card); border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
        .product-card.sold { opacity: 0.6; filter: grayscale(0.7); }
        .product-card img { width: 100%; height: 280px; object-fit: cover; cursor: pointer; }
        
        .badge-sold { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: var(--danger); color: white; padding: 10px 30px; border-radius: 10px; font-size: 24px; font-weight: bold; border: 4px solid white; z-index: 20; display: none; }
        .product-card.sold .badge-sold { display: block; }

        .verified { position: absolute; top: 15px; left: 15px; background: white; color: var(--accent); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); z-index: 10; }
        .stats-row { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; z-index: 10; }
        .stat-item { background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; }

        .product-info { padding: 25px; }
        .price { color: var(--secondary); font-size: 32px; font-weight: 900; margin: 10px 0; }
        
        .vote-row { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .vote-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 5px; }

        .action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .act-btn { padding: 12px; border-radius: 12px; text-decoration: none; text-align: center; color: white; font-weight: bold; font-size: 14px; border: none; cursor: pointer; }

        .comment-area { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 20px; margin-top: 15px; text-align: left; }
        .comm-list { max-height: 80px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; }
        .comm-item { background: var(--card); padding: 6px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid var(--accent); }

        .admin-box { margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 10px; display: flex; gap: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 10px; border: none; font-size: 10px; cursor: pointer; color: white; font-weight: bold; }

        .theme-btn { position: fixed; top: 15px; right: 15px; z-index: 1000; background: var(--card); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: var(--text); }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body id="body">

<button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>

<header>
    <h1>ሳይንት ገበያ ፕሮ ማክስ</h1>
    <p>የአምሐራ ሳይንት የንግድና የቴክኖሎጂ ማዕከል | በያለለት መለካሙ የተገነባ</p>
</header>

<div class="container">
    <div class="card">
        <input type="text" id="searchBox" onkeyup="filterItems()" placeholder="ምርት ይፈልጉ...">
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
            <select id="pCatFilter" onchange="filterItems()" style="width: auto; margin-bottom: 0;">
                <option value="">ሁሉም ዘርፍ</option>
                <option value="እህል">እህል</option>
                <option value="ከብት">ከብት</option>
                <option value="ማር">ማር</option>
            </select>
            <select id="sortPrice" onchange="filterItems()" style="width: auto; margin-bottom: 0;">
                <option value="new">አዲስ የተለጠፈ</option>
                <option value="low">ዋጋ፡ ከረካሽ</option>
                <option value="high">ዋጋ፡ ከውድ</option>
            </select>
        </div>
        <button class="btn btn-add" onclick="toggleAdmin()">+ አዲስ ምርት በዝርዝር ይጨምሩ</button>
        <button class="btn" style="background:var(--dark); margin-top:5px;" onclick="viewReceipts()">የገቡ ደረሰኞችን እይ (Admin)</button>

        <div id="adminForm" style="display:none; margin-top:20px;">
            <input type="text" id="pName" placeholder="የምርት ስም">
            <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            <select id="pCat">
                <option value="ሌላ">ዘርፍ ይምረጡ</option>
                <option value="እህል">እህል</option>
                <option value="ከብት">ከብት</option>
                <option value="ማር">ማር</option>
            </select>
            <input type="text" id="pSeller" placeholder="የሻጭ ስም">
            <input type="text" id="pPhone" placeholder="ስልክ ቁጥር">
            <input type="text" id="pTg" placeholder="ቴሌግራም ስም (ያለ @)">
            <input type="text" id="pBank" placeholder="የባንክ/ቴሌብር መረጃ">
            <input type="text" id="pLoc" placeholder="የመንደር/ቀበሌ ስም">
            <textarea id="pDesc" placeholder="ስለ ምርቱ ዝርዝር መግለጫ..."></textarea>
            <input type="file" id="pImage" accept="image/*">
            <div id="loading" style="display:none; color:var(--accent); font-weight:bold; margin-bottom:10px;">ፎቶው እየተዘጋጀ ነው...</div>
            <button class="btn" id="submitBtn" onclick="processAndAdd()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>

    <!-- ደረሰኞች ማያ ክፍል -->
    <div id="receiptSection" style="display:none;" class="card">
        <h3>የገቡ የክፍያ ደረሰኞች (Admin)</h3>
        <div id="receiptList"></div>
    </div>

    <div id="productGrid" class="product-grid"></div>
</div>

<!-- ክፍያ Modal -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">የክፍያ ማረጋገጫ</h2>
        <p id="bankDetails" style="font-size: 18px; font-weight: bold; margin: 15px 0;"></p>
        <p style="font-size: 13px;">ከከፈሉ በኋላ የደረሰኙን Screenshot እዚህ ይላኩ፦</p>
        <input type="file" id="receiptImg" style="margin: 15px 0;">
        <button class="btn" style="background:var(--accent)" onclick="sendReceipt()">ደረሰኝ ላክ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">ዝጋ</button>
    </div>
</div>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allProducts = [];
    let currentProductName = "";

    function toggleTheme() { document.getElementById('body').classList.toggle('dark-mode'); }
    function toggleAdmin() { const f = document.getElementById('adminForm'); f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
    function closeModal() { document.getElementById('payModal').style.display = "none"; }

    // 2. Add Product with Compression
    async function processAndAdd() {
        const file = document.getElementById('pImage').files[0];
        const name = document.getElementById('pName').value;
        if(!file || !name) { alert("መረጃ ያሟሉ!"); return; }
        
        document.getElementById('loading').style.display = "block";
        document.getElementById('submitBtn').disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let w = img.width, h = img.height;
                if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; }
                canvas.width = w; canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                const compressed = canvas.toDataURL("image/jpeg", 0.6);
                
                db.ref('products').push({
                    name: name,
                    price: Number(document.getElementById('pPrice').value),
                    category: document.getElementById('pCat').value,
                    seller: document.getElementById('pSeller').value,
                    phone: document.getElementById('pPhone').value,
                    telegram: document.getElementById('pTg').value,
                    bank: document.getElementById('pBank').value,
                    loc: document.getElementById('pLoc').value,
                    desc: document.getElementById('pDesc').value,
                    img: compressed,
                    status: 'available', views: 0, likes: 0, dislikes: 0, time: Date.now()
                }).then(() => location.reload());
            };
        };
    }

    // 3. Data Fetching
    db.ref('products').on('value', snap => {
        allProducts = [];
        snap.forEach(child => {
            let d = child.val(); d.id = child.key;
            allProducts.push(d);
        });
        filterItems();
    });

    function filterItems() {
        const term = document.getElementById('searchBox').value.toLowerCase();
        const cat = document.getElementById('pCatFilter').value;
        const sort = document.getElementById('sortPrice').value;
        let filtered = allProducts.filter(p => {
            return p.name.toLowerCase().includes(term) && (cat === "" || p.category === cat);
        });
        if(sort === "low") filtered.sort((a,b) => a.price - b.price);
        if(sort === "high") filtered.sort((a,b) => b.price - a.price);
        if(sort === "new") filtered.sort((a,b) => b.time - a.time);
        renderGrid(filtered);
    }

    function renderGrid(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.reverse().forEach(p => {
            const isSold = p.status === 'sold';
            let comms = "";
            if(p.comments) Object.values(p.comments).forEach(c => comms += `<div class="comm-item">💬 ${c.text}</div>`);

            grid.innerHTML += `
                <div class="product-card ${isSold ? 'sold' : ''}">
                    <div class="verified"><i class="fas fa-check-circle"></i> የታመነ</div>
                    <div class="stats-row">
                        <div class="stat-item">👁️ ${p.views || 0}</div>
                    </div>
                    <div class="badge-sold">ተሽጧል</div>
                    <img src="${p.img}" onclick="updateStat('${p.id}', 'views')">
                    <div class="product-info">
                        <span style="font-size:10px; color:var(--primary); font-weight:bold;">${p.category}</span>
                        <h3>${p.name}</h3>
                        <div style="color:var(--secondary); font-size:12px; margin-bottom:5px;"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <p style="font-size:12px; color:var(--gray)">📍 ${p.loc} | 👤 ${p.seller}</p>
                        
                        <div class="vote-row">
                            <button class="vote-btn" onclick="updateStat('${p.id}', 'likes')">👍 ${p.likes || 0}</button>
                            <button class="vote-btn" onclick="updateStat('${p.id}', 'dislikes')">👎 ${p.dislikes || 0}</button>
                        </div>

                        <div class="action-group">
                            <a href="tel:${p.phone}" class="act-btn" style="background:var(--primary)">ደውል</a>
                            <a href="https://t.me/${p.telegram}" target="_blank" class="act-btn" style="background:#0088cc">አውራ</a>
                        </div>
                        
                        <button class="btn" style="background:var(--accent); margin-top:10px;" onclick="shareTg('${p.name}', '${p.price}')">📲 አጋራ</button>
                        <button class="btn" style="background:var(--dark); margin-top:5px;" onclick="openPay('${p.name}', '${p.bank}')">💳 ክፈል / ደረሰኝ ላክ</button>

                        <div class="comment-area">
                            <div class="comm-list">${comms || 'አስተያየት የለም'}</div>
                            <div style="display:flex; gap:5px;">
                                <input type="text" id="in-${p.id}" placeholder="አስተያየት..." style="margin-bottom:0; font-size:12px;">
                                <button class="btn" style="width:60px; padding:5px;" onclick="addComm('${p.id}')">ላክ</button>
                            </div>
                        </div>

                        <div class="admin-box">
                            <button class="btn-sm" style="background:#34495e;" onclick="markSold('${p.id}')">ተሽጧል</button>
                            <button class="btn-sm" style="background:var(--danger);" onclick="delItem('${p.id}')">አጥፋ</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function updateStat(id, type) { db.ref('products/' + id + '/' + type).transaction(c => (c || 0) + 1); }
    function addComm(id) {
        const t = document.getElementById('in-' + id).value;
        if(t) { db.ref('products/' + id + '/comments').push({ text: t }); document.getElementById('in-' + id).value = ""; }
    }
    function shareTg(n, p) { window.open(`https://t.me/share/url?url=${encodeURIComponent("የሳይንት ገበያ ምርት፡ "+n+"\nዋጋ፡ "+p+" ብር\nእዚህ ይመልከቱ፡ "+window.location.href)}`); }
    function openPay(n, b) { currentProductName = n; document.getElementById('bankDetails').innerText = b; document.getElementById('payModal').style.display = "block"; }
    
    function markSold(id) { if(prompt("PIN?") === "2024") db.ref('products/' + id).update({ status: 'sold' }); }
    function delItem(id) { if(prompt("PIN?") === "2024") db.ref('products/' + id).remove(); }

    // 4. ደረሰኝ የመላኪያ ተግባር
    function sendReceipt() {
        const file = document.getElementById('receiptImg').files[0];
        if(!file) { alert("ደረሰኝ ፎቶ ይምረጡ!"); return; }
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            db.ref('receipts').push({
                product: currentProductName,
                img: reader.result,
                time: new Date().toLocaleString()
            }).then(() => {
                alert("ደረሰኝ በተሳካ ሁኔታ ተልኳል! ሻጩ ያረጋግጣል።");
                closeModal();
            });
        };
    }

    // 5. ደረሰኞችን ማያ ክፍል (Admin)
    function viewReceipts() {
        if(prompt("Admin PIN?") === "2024") {
            const s = document.getElementById('receiptSection');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
            db.ref('receipts').on('value', snap => {
                const list = document.getElementById('receiptList');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `
                        <div style="border-bottom:1px solid #ddd; padding:15px; display:flex; gap:15px; align-items:center;">
                            <img src="${d.img}" style="width:120px; border-radius:10px; cursor:pointer;" onclick="window.open(this.src)">
                            <div>
                                <p><strong>ምርት፡</strong> ${d.product}</p>
                                <p><strong>ሰዓት፡</strong> ${d.time}</p>
                            </div>
                        </div>`;
                });
            });
        }
    }
</script>
</body>
</html>
