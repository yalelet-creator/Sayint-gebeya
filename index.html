<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮ ማክስ | Sayint Gebeya Ultimate</title>
    
    <!-- Firebase & Icons -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 1. ዲዛይንና ቀለሞች */
        :root { 
            --primary: #2ecc71; --secondary: #f39c12; --accent: #3498db; 
            --danger: #e74c3c; --bg: #f0f2f5; --card: #ffffff; --text: #333; 
        }
        
        .dark-mode { 
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; 
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 50px; }
        
        /* Header */
        header { 
            background: linear-gradient(135deg, var(--primary), #27ae60); color: white; 
            padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--secondary);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        /* Theme Toggle */
        .theme-btn { 
            position: fixed; top: 20px; right: 20px; z-index: 1000; 
            background: var(--card); color: var(--text); border: none; padding: 12px; 
            border-radius: 50%; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Admin & Search Card */
        .top-card { background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea, select { 
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 15px; 
            margin-bottom: 12px; background: var(--card); color: var(--text); outline: none; box-sizing: border-box;
        }

        .btn { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s;
        }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }

        /* Product Grid & Cards */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .product-card { background: var(--card); border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
        .product-card.sold { opacity: 0.6; filter: grayscale(0.7); }
        .product-card img { width: 100%; height: 280px; object-fit: cover; cursor: pointer; }

        .verified { position: absolute; top: 15px; left: 15px; background: white; color: var(--accent); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .views-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; }

        .product-info { padding: 25px; }
        .price { color: var(--secondary); font-size: 32px; font-weight: 900; margin: 10px 0; }
        
        /* Stats & Interaction */
        .vote-row { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .vote-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text); }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .action-link { padding: 12px; border-radius: 12px; text-decoration: none; text-align: center; color: white; font-weight: bold; font-size: 14px; }
        .bg-green { background: var(--primary); }
        .bg-blue { background: var(--accent); }
        .bg-tg { background: #0088cc; }

        /* Comments Section */
        .comment-area { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 20px; margin-top: 15px; }
        .comm-list { max-height: 80px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; }
        .comm-item { background: var(--card); padding: 6px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid var(--accent); }

        .admin-box { margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 10px; display: flex; gap: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 10px; border: none; font-size: 10px; cursor: pointer; color: white; font-weight: bold; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body id="body">

<button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>

<header>
    <h1>ሳይንት ገበያ ፕሮ ማክስ</h1>
    <p>የአምሐራ ሳይንት የንግድና የቴክኖሎጂ ማዕከል | በያለለት መለካሙ የተገነባ</p>
</header>

<div class="container">
    <div class="top-card">
        <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="የሚፈልጉትን ምርት እዚህ ይፈልጉ...">
        <button class="btn btn-add" onclick="toggleAdminPanel()">+ አዲስ ምርት በዝርዝር ይጨምሩ</button>
        <button class="btn" style="background:var(--dark); margin-top:5px;" onclick="viewReceipts()">የገቡ ደረሰኞችን እይ (Admin)</button>

        <div id="adminPanel" style="display:none; margin-top:20px;">
            <input type="text" id="pName" placeholder="የምርት ስም">
            <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            <input type="text" id="pSeller" placeholder="የሻጭ ስም">
            <input type="text" id="pPhone" placeholder="ስልክ ቁጥር">
            <input type="text" id="pTg" placeholder="የቴሌግራም ስም (ያለ @)">
            <input type="text" id="pBank" placeholder="የባንክ/ቴሌብር መረጃ">
            <textarea id="pDesc" placeholder="ስለ ምርቱ ዝርዝር መግለጫ..."></textarea>
            <input type="file" id="pImage" accept="image/*">
            <button class="btn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>

    <div id="receiptsDisplay" style="display:none;" class="top-card">
        <h3>የደረሰኞች ማከማቻ</h3>
        <div id="receiptList"></div>
    </div>

    <div id="productGrid" class="product-grid"></div>
</div>

<!-- Pay Modal -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">የክፍያ መረጃ</h2>
        <p id="bankDetails" style="font-size: 18px; font-weight: bold; margin: 20px 0;"></p>
        <input type="file" id="receiptImg">
        <button class="btn" style="background:var(--accent); margin-top:15px;" onclick="sendReceipt()">ደረሰኝ ላክ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">ዝጋ</button>
    </div>
</div>

<script>
    // 2. Firebase Configuration (ያለለት ፕሮጀክት)
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentP = "";

    // Theme Switcher
    function toggleTheme() {
        document.getElementById('body').classList.toggle('dark-mode');
    }

    function toggleAdminPanel() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    // Add Product
    function addProduct() {
        const name = document.getElementById('pName').value;
        const imgFile = document.getElementById('pImage').files[0];
        if(!name || !imgFile) { alert("መረጃ ያሟሉ!"); return; }

        const reader = new FileReader();
        reader.readAsDataURL(imgFile);
        reader.onload = () => {
            db.ref('products').push({
                name, 
                price: document.getElementById('pPrice').value,
                seller: document.getElementById('pSeller').value,
                phone: document.getElementById('pPhone').value,
                telegram: document.getElementById('pTg').value,
                bank: document.getElementById('pBank').value,
                desc: document.getElementById('pDesc').value,
                img: reader.result,
                status: 'available', views: 0, likes: 0, dislikes: 0,
                time: new Date().toLocaleString()
            }).then(() => location.reload());
        };
    }

    // Render Products
    db.ref('products').on('value', snap => {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        snap.forEach(child => {
            const p = child.val();
            const id = child.key;
            const isSold = p.status === 'sold';
            
            let comms = "";
            if(p.comments) Object.values(p.comments).forEach(c => comms += `<div class="comm-item">💬 ${c.text}</div>`);

            grid.innerHTML += `
                <div class="product-card ${isSold ? 'sold' : ''}">
                    <div class="verified"><i class="fas fa-check-circle"></i> የታመነ</div>
                    <div class="views-badge">👁️ ${p.views || 0} እይታ</div>
                    <img src="${p.img}" onclick="updateStat('${id}', 'views')">
                    
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div style="color:var(--secondary); font-size:12px; margin-bottom:5px;">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <p style="font-size:12px; color:var(--gray)">📍 ${p.seller} | ${p.time}</p>

                        <div class="vote-row">
                            <button class="vote-btn" onclick="updateStat('${id}', 'likes')">👍 ${p.likes || 0}</button>
                            <button class="vote-btn" onclick="updateStat('${id}', 'dislikes')">👎 ${p.dislikes || 0}</button>
                        </div>

                        <div class="btn-group">
                            <a href="tel:${p.phone}" class="action-link bg-green"><i class="fas fa-phone"></i> ደውል</a>
                            <a href="https://t.me/${p.telegram}" target="_blank" class="action-link bg-tg"><i class="fab fa-telegram"></i> አውራ</a>
                        </div>
                        
                        <button class="btn" style="background:var(--accent); margin-top:10px;" onclick="shareTg('${p.name}', '${p.price}')">📲 በቴሌግራም አጋራ</button>
                        <button class="btn" style="background:var(--dark); margin-top:5px;" onclick="openPay('${p.name}', '${p.bank}')">💳 ክፈል</button>

                        <div class="comment-area">
                            <div class="comm-list">${comms || 'አስተያየት የለም'}</div>
                            <div style="display:flex; gap:5px;">
                                <input type="text" id="in-${id}" placeholder="አስተያየት..." style="margin-bottom:0; font-size:12px;">
                                <button class="btn" style="width:60px; padding:5px;" onclick="addComm('${id}')">ላክ</button>
                            </div>
                        </div>

                        <div class="admin-box">
                            <button class="btn-sm" style="background:#34495e;" onclick="markSold('${id}')">ተሽጧል</button>
                            <button class="btn-sm" style="background:var(--danger);" onclick="delItem('${id}')">አጥፋ</button>
                        </div>
                    </div>
                </div>`;
        });
    });

    function updateStat(id, type) { db.ref('products/' + id + '/' + type).transaction(c => (c || 0) + 1); }
    function addComm(id) {
        const t = document.getElementById('in-' + id).value;
        if(t) { db.ref('products/' + id + '/comments').push({ text: t }); document.getElementById('in-' + id).value = ""; }
    }
    function shareTg(n, p) { window.open(`https://t.me/share/url?url=${encodeURIComponent("የሳይንት ገበያ ምርት፡ " + n + "\nዋጋ፡ " + p + " ብር")}`); }
    function openPay(n, b) { currentP = n; document.getElementById('bankDetails').innerText = b; document.getElementById('payModal').style.display = "block"; }
    function closeModal() { document.getElementById('payModal').style.display = "none"; }
    
    function markSold(id) { if(prompt("PIN?") === "2024") db.ref('products/' + id).update({ status: 'sold' }); }
    function delItem(id) { if(prompt("PIN?") === "2024") db.ref('products/' + id).remove(); }

    function sendReceipt() {
        const f = document.getElementById('receiptImg').files[0];
        if(!f) return;
        const r = new FileReader();
        r.readAsDataURL(f);
        r.onload = () => {
            db.ref('receipts').push({ product: currentP, img: r.result, time: new Date().toLocaleString() });
            alert("ደረሰኝ ተልኳል!"); closeModal();
        };
    }

    function viewReceipts() {
        if(prompt("PIN?") === "2024") {
            const s = document.getElementById('receiptsDisplay');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
            db.ref('receipts').on('value', snap => {
                const list = document.getElementById('receiptList'); list.innerHTML = "";
                snap.forEach(c => { const d = c.val(); list.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px;"><p>${d.product}</p><img src="${d.img}" style="width:100px;"></div>`; });
            });
        }
    }

    function searchProducts() {
        const t = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(c => {
            c.style.display = c.querySelector('h3').innerText.toLowerCase().includes(t) ? "block" : "none";
        });
    }
</script>
</body>
</html>
