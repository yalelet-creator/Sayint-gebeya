<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮ | በአምሐራ ሳይንት የቀረበ</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #27ae60; --secondary: #e67e22; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        header { background: var(--primary); color: white; padding: 30px 15px; text-align: center; border-bottom: 5px solid var(--secondary); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* ፎርም እና መፈለጊያ */
        .controls { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        input, select { padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; }
        input { flex: 1; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; transition: 0.3s; }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }
        
        #adminForm { display: none; background: #fffcf9; padding: 20px; border-radius: 15px; border: 1px dashed var(--secondary); margin-top: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        /* ምርቶች */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--secondary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .product-info { padding: 20px; text-align: center; }
        .price { color: var(--secondary); font-size: 28px; font-weight: bold; margin: 10px 0; }
        .location { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; }
        .call-btn { background: var(--primary); color: white; padding: 15px; display: block; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 18px; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.3); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ ፕሮ (Sayint Gebeya Pro)</h1>
    <p>የአምሐራ ሳይንት የዲጂታል ገበያ ማዕከል | በያለለት የተገነባ</p>
</header>

<div class="container">
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="ምርት ይፈልጉ (ለምሳሌ፡ በግ፣ ማር...)">
            <select id="filterCategory" onchange="searchProducts()">
                <option value="">ሁሉም ዘርፍ</option>
                <option value="እህል">እህል</option>
                <option value="ከብት">ከብት</option>
                <option value="ማር">ማር</option>
                <option value="ሌላ">ሌላ</option>
            </select>
        </div>
        
        <button class="btn btn-add" onclick="toggleForm()">+ አዲስ ምርት በፎቶ ይጨምሩ</button>
        
        <div id="adminForm">
            <div class="form-grid">
                <input type="text" id="pName" placeholder="የምርት ስም">
                <input type="number" id="pPrice" placeholder="ዋጋ (ብር)">
            </div>
            <div class="form-grid">
                <input type="text" id="pLocation" placeholder="ያለበት ቦታ (ቀበሌ/መንደር)">
                <input type="text" id="pPhone" placeholder="የሻጭ ስልክ">
            </div>
            <select id="pCategory" style="width:100%; margin-bottom:10px;">
                <option value="ሌላ">ዘርፍ ይምረጡ</option>
                <option value="እህል">እህል</option>
                <option value="ከብት">ከብት</option>
                <option value="ማር">ማር</option>
            </select>
            <input type="file" id="pImage" accept="image/*">
            <button class="btn" id="submitBtn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let allProducts = [];

    function toggleForm() {
        const form = document.getElementById('adminForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const phone = document.getElementById('pPhone').value;
        const location = document.getElementById('pLocation').value;
        const category = document.getElementById('pCategory').value;
        const imageFile = document.getElementById('pImage').files[0];

        if(!name || !price || !phone || !imageFile) { alert("መረጃ ያሟሉ!"); return; }

        const reader = new FileReader();
        reader.readAsDataURL(imageFile);
        reader.onload = function () {
            database.ref('products').push({ 
                name, price, phone, location, category, img: reader.result 
            }).then(() => { location.reload(); });
        };
    }

    database.ref('products').on('value', (snapshot) => {
        allProducts = [];
        snapshot.forEach(child => {
            let data = child.val();
            data.id = child.key;
            allProducts.push(data);
        });
        displayProducts(allProducts);
    });

    function displayProducts(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        items.forEach((p) => {
            grid.innerHTML += `
                <div class="product-card">
                    <button class="delete-btn" onclick="deleteItem('${p.id}')">አጥፋ</button>
                    <span class="badge">${p.category || 'ሌላ'}</span>
                    <img src="${p.img}" alt="product">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <p class="location">📍 ቦታ፦ ${p.location || 'ሳይንት'}</p>
                        <a href="tel:${p.phone}" class="call-btn">ደውለው ይዘዙ</a>
                    </div>
                </div>`;
        });
    }

    function searchProducts() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const cat = document.getElementById('filterCategory').value;
        const filtered = allProducts.filter(p => {
            const matchName = p.name.toLowerCase().includes(term);
            const matchCat = cat === "" || p.category === cat;
            return matchName && matchCat;
        });
        displayProducts(filtered);
    }

    function deleteItem(id) {
        const pin = prompt("ይህንን ምርት ለማጥፋት ሚስጥራዊ ቁጥሩን (PIN) ያስገቡ፦");
        if(pin === "2024") { // ይህ ያንተ ሚስጥራዊ ቁጥር ነው
            database.ref('products/' + id).remove();
        } else {
            alert("የተሳሳተ ቁጥር! ማጥፋት አይችሉም።");
        }
    }
</script>
</body>
</html>
