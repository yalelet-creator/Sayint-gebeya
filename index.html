<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ገበያ ፕሮ | Sayint Gebeya Social</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #f39c12; --dark: #2c3e50; --light: #f8f9fa; --accent: #3498db; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        header { background: var(--primary); color: white; padding: 30px 15px; text-align: center; border-bottom: 6px solid var(--secondary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }
        #adminForm { display: none; background: #fffcf4; padding: 20px; border-radius: 15px; border: 2px dashed var(--secondary); margin-top: 10px; }

        /* Product Card */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; }
        .product-card img { width: 100%; height: 230px; object-fit: cover; }
        
        .view-count { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
        .product-info { padding: 20px; }
        .price { color: var(--secondary); font-size: 26px; font-weight: bold; margin: 5px 0; }
        
        /* Comment System */
        .comment-box { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; }
        .comment-list { max-height: 100px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .single-comment { margin-bottom: 5px; padding: 5px; background: white; border-radius: 5px; }
        .comment-input-row { display: flex; gap: 5px; }
        .comment-input-row input { margin-bottom: 0; padding: 8px; font-size: 13px; }
        .btn-send { width: 60px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-call { flex: 1; background: var(--primary); text-decoration: none; color: white; text-align: center; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .btn-pay { flex: 1; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>ሳይንት ገበያ ፕሮ (Sayint Gebeya)</h1>
    <p>የአምሐራ ሳይንት የዲጂታል ገበያ ማዕከል | በያለለት መለካሙ</p>
</header>

<div class="container">
    <div class="card">
        <input type="text" id="searchBar" onkeyup="searchProducts()" placeholder="ምርት ይፈልጉ...">
        <button class="btn btn-add" onclick="toggleForm()">+ አዲስ ምርት ይጨምሩ</button>
        <div id="adminForm">
            <input type="text" id="pName" placeholder="የምርት ስም">
            <input type="number" id="pPrice" placeholder="ዋጋ">
            <input type="text" id="pPhone" placeholder="ስልክ">
            <input type="text" id="pBank" placeholder="ባንክ/ቴሌብር">
            <input type="file" id="pImage" accept="image/*">
            <button class="btn" onclick="addProduct()">ገበያ ላይ ይውጣ</button>
        </div>
    </div>
    <div id="productGrid" class="product-grid"></div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleForm() {
        const f = document.getElementById('adminForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const phone = document.getElementById('pPhone').value;
        const imgFile = document.getElementById('pImage').files[0];
        if(!name || !imgFile) return;

        const reader = new FileReader();
        reader.readAsDataURL(imgFile);
        reader.onload = () => {
            db.ref('products').push({
                name, price, phone, 
                bank: document.getElementById('pBank').value,
                img: reader.result,
                views: 0, // መጀመሪያ 0 እይታ
                time: new Date().toLocaleString()
            }).then(() => location.reload());
        };
    }

    db.ref('products').on('value', snap => {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        snap.forEach(child => {
            const p = child.val();
            const id = child.key;
            
            // የኮሜንት ዝርዝር ማዘጋጃ
            let commentHTML = "";
            if(p.comments) {
                Object.values(p.comments).forEach(c => {
                    commentHTML += `<div class="single-comment">💬 ${c.text}</div>`;
                });
            }

            grid.innerHTML += `
                <div class="product-card" onclick="incrementView('${id}', ${p.views || 0})">
                    <span class="view-count">👁️ ${p.views || 0} እይታ</span>
                    <img src="${p.img}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">${Number(p.price).toLocaleString()} ብር</p>
                        <div class="btn-group">
                            <a href="tel:${p.phone}" class="btn-call">ደውል</a>
                            <button class="btn-pay" onclick="alert('ባንክ፡ ${p.bank}')">ክፈል</button>
                        </div>
                        
                        <div class="comment-box">
                            <div class="comment-list">${commentHTML || 'አስተያየት የለም'}</div>
                            <div class="comment-input-row">
                                <input type="text" id="input-${id}" placeholder="አስተያየት ይጻፉ...">
                                <button class="btn-send" onclick="addComment('${id}')">ላክ</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    });

    // እይታን ለመጨመር
    function incrementView(id, currentViews) {
        db.ref('products/' + id).update({ views: currentViews + 1 });
    }

    // አስተያየት ለመጨመር
    function addComment(id) {
        const text = document.getElementById('input-' + id).value;
        if(!text) return;
        db.ref('products/' + id + '/comments').push({ text: text });
        document.getElementById('input-' + id).value = "";
    }

    function searchProducts() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            const name = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = name.includes(term) ? "block" : "none";
        });
    }
</script>
</body>
</html>
